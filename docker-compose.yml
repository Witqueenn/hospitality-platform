version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hospitality_postgres
    environment:
      POSTGRES_DB: hospitality_platform
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d hospitality_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hospitality_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: hospitality_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
